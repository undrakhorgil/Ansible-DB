---
# Core OS / Oracle settings (single-instance on OEL 8.x)
oracle_base: /u01/app/oracle
oracle_grid_base: /u01/app/grid
oracle_inventory: /u01/app/oraInventory
oracle_home: /u01/app/oracle/product/23ai/dbhome_1
grid_home: /u01/app/23ai/grid

oracle_user: oracle
grid_user: grid
oinstall_group: oinstall
dba_group: dba
asmadmin_group: asmadmin
asmdba_group: asmdba
asmoper_group: asmoper

# Versions (adapt to your media)
oracle_version: "23ai"
grid_version: "23ai"

# OS preinstall package for Oracle on OEL 8.x
# Adjust if Oracle ships a different meta-package name in your repo.
oracle_preinstall_package: "oracle-database-preinstall-19c"

# Paths (on Ansible control machine) to installation media for 23ai
# Replace with actual filenames for your downloaded zips.
oracle_db_software_zip: "/path/to/LINUX.X64_23AI_db_home.zip"
oracle_grid_software_zip: "/path/to/LINUX.X64_23AI_grid_home.zip"

# Target OS disks for ASM (example)
asm_disks:
  - /dev/sdb
  - /dev/sdc

# Listener and database definitions
listener_port: 1521
db_name: ORCL
db_unique_name: ORCL
db_sid: ORCL
db_character_set: AL32UTF8
db_block_size: 8192

# Example passwords (store in Ansible Vault for real use)
oracle_sys_password: "SysPassword1"
oracle_system_password: "SystemPassword1"
asm_sys_password: "AsmSysPassword1"

