---
- name: Build dynamic inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate basic vars
      ansible.builtin.assert:
        that:
          - rac_nodes | length >= 2
          - target_root_password | length > 0
        quiet: true

    - name: Add RAC nodes
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: oracle_rac_servers
        ansible_host: "{{ item.public_ip }}"
      loop: "{{ rac_nodes }}"
