---
# Step 13: discovery/validation up to selecting crsctl + olsnodes executables.

- name: Compute application root for searching crsctl
  ansible.builtin.set_fact:
    app_root: "{{ oracle_base | dirname }}"
  when: inventory_hostname == rac_primary_node

- name: Locate crsctl (expected or anywhere under app_root)
  ansible.builtin.shell: |
    set -e
    if [ -f "{{ grid_home }}/bin/crsctl" ]; then
      echo "{{ grid_home }}/bin/crsctl"
      exit 0
    fi
    if [ -f "{{ grid_home }}/bin/crsctl.bin" ]; then
      echo "{{ grid_home }}/bin/crsctl.bin"
      exit 0
    fi
    find "{{ app_root }}" -maxdepth 10 -type f \( -name crsctl -o -name crsctl.bin \) -print -quit 2>/dev/null || true
  args:
    executable: /bin/bash
  register: crsctl_found
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Inspect expected grid_home bin directory
  ansible.builtin.shell: |
    set -e
    echo "grid_home={{ grid_home }}"
    echo "grid_home exists?"; [ -d "{{ grid_home }}" ] && echo yes || echo no
    echo "bin exists?"; [ -d "{{ grid_home }}/bin" ] && echo yes || echo no
    echo "--- crsctl candidates ---"
    ls -l "{{ grid_home }}/bin"/crsctl* 2>/dev/null || true
    echo "--- olsnodes candidates ---"
    ls -l "{{ grid_home }}/bin"/olsnodes* 2>/dev/null || true
    echo "--- response candidates ---"
    ls -l "{{ grid_home }}/install/response"/gridsetup*.rsp 2>/dev/null || true
  args:
    executable: /bin/bash
  register: grid_bin_inspect
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: If crsctl not found under app_root, broaden search under /u01
  ansible.builtin.shell: |
    set -e
    if [ -n "{{ crsctl_found.stdout | trim }}" ]; then
      exit 0
    fi
    find /u01 -maxdepth 12 -type f \( -name crsctl -o -name crsctl.bin \) -print -quit 2>/dev/null || true
  args:
    executable: /bin/bash
  register: crsctl_found_u01
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: Derive effective grid home from crsctl path
  ansible.builtin.set_fact:
    grid_home_effective: "{{ (crsctl_found.stdout | trim | length > 0) | ternary(((crsctl_found.stdout | trim) | dirname | dirname), grid_home) }}"
  when: inventory_hostname == rac_primary_node

- name: Prefer broadened crsctl result if present
  ansible.builtin.set_fact:
    grid_home_effective: "{{ (crsctl_found_u01.stdout | trim | length > 0) | ternary(((crsctl_found_u01.stdout | trim) | dirname | dirname), grid_home_effective) }}"
  when: inventory_hostname == rac_primary_node

- name: Debug crsctl find results and grid_home inspection (host01)
  ansible.builtin.debug:
    msg:
      - "crsctl_expected_path={{ grid_home }}/bin/crsctl"
      - "crsctl_found_under_app={{ crsctl_found.stdout | trim }}"
      - "crsctl_found_under_u01={{ crsctl_found_u01.stdout | trim }}"
      - "{{ (grid_bin_inspect.stdout | default('')) | truncate(800, True, '…') }}"
  when: inventory_hostname == rac_primary_node

- name: Validate crsctl exists (expected or located)
  ansible.builtin.assert:
    that:
      - (crsctl_found.stdout | trim | length > 0) or (crsctl_found_u01.stdout | trim | length > 0)
    fail_msg: >-
      crsctl not found under expected Grid home {{ grid_home }}.
      Searched under {{ app_root }} and /u01 but found nothing.
      This usually means Grid install did not lay down CRS binaries.
  when: inventory_hostname == rac_primary_node

- name: Show latest GridSetupActions log tail (host01)
  ansible.builtin.shell: |
    set -e
    LOG="$(ls -t "{{ oracle_inventory }}/logs"/GridSetupActions* 2>/dev/null | head -n 1 || true)"
    if [ -z "$LOG" ]; then
      echo "No GridSetupActions logs found under {{ oracle_inventory }}/logs"
      exit 0
    fi
    echo "Latest GridSetup log: $LOG"
    tail -n 80 "$LOG" 2>/dev/null || true
  args:
    executable: /bin/bash
  register: grid_log_tail
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: Check crsctl/crsctl.bin and olsnodes/olsnodes.bin
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ grid_home_effective }}/bin/crsctl"
    - "{{ grid_home_effective }}/bin/crsctl.bin"
    - "{{ grid_home_effective }}/bin/olsnodes"
    - "{{ grid_home_effective }}/bin/olsnodes.bin"
  register: crs_exec_stats
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Select executables (prefer wrappers without .bin)
  ansible.builtin.set_fact:
    crsctl_exec: >-
      {{
        (crs_exec_stats.results
          | selectattr('item', 'equalto', grid_home_effective ~ '/bin/crsctl')
          | first).stat.exists
          | ternary(grid_home_effective ~ '/bin/crsctl', grid_home_effective ~ '/bin/crsctl.bin')
      }}
    olsnodes_exec: >-
      {{
        (crs_exec_stats.results
          | selectattr('item', 'equalto', grid_home_effective ~ '/bin/olsnodes')
          | first).stat.exists
          | ternary(grid_home_effective ~ '/bin/olsnodes', grid_home_effective ~ '/bin/olsnodes.bin')
      }}
  when: inventory_hostname == rac_primary_node

- name: Validate selected executables exist
  ansible.builtin.assert:
    that:
      - crsctl_exec is defined
      - olsnodes_exec is defined
      - (
          (crs_exec_stats.results | selectattr('item', 'equalto', grid_home_effective ~ '/bin/crsctl') | first).stat.exists
          or
          (crs_exec_stats.results | selectattr('item', 'equalto', grid_home_effective ~ '/bin/crsctl.bin') | first).stat.exists
        )
      - (
          (crs_exec_stats.results | selectattr('item', 'equalto', grid_home_effective ~ '/bin/olsnodes') | first).stat.exists
          or
          (crs_exec_stats.results | selectattr('item', 'equalto', grid_home_effective ~ '/bin/olsnodes.bin') | first).stat.exists
        )
  when: inventory_hostname == rac_primary_node

