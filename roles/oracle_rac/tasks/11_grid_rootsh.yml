---
# Step 11: run Grid root.sh explicitly on all nodes

- name: Run GI root.sh explicitly (required for CRS_CONFIG)
  ansible.builtin.shell: |
    set -euo pipefail
    echo "Running root.sh on $(hostname -f) ..."
    cd "{{ grid_home }}"
    export ORACLE_HOME="{{ grid_home }}"
    export GRID_HOME="{{ grid_home }}"
    export ORACLE_BASE="{{ oracle_base }}"
    ./root.sh
  args:
    executable: /bin/bash
  become: true
  become_user: root
  when:
    - inventory_hostname in (groups['oracle_rac_servers'] | default([]))
    - (oracle_grid_install_option | default('CRS_CONFIG')) == 'CRS_CONFIG'
  changed_when: true

- name: Fix ADR diag permissions for CRSCTL (DIA-49801/49802)
  ansible.builtin.shell: |
    set -euo pipefail
    D="{{ oracle_base }}/diag"
    # Avoid world-writable Oracle trees; keep group writable for oinstall.
    if [ -d "$D" ]; then
      chown -R "{{ grid_user }}:{{ oinstall_group }}" "$D" 2>/dev/null || true
      chmod -R {{ oracle_adr_diag_mode | default('0775') }} "$D" 2>/dev/null || true
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: root
  when:
    - inventory_hostname in (groups['oracle_rac_servers'] | default([]))
    - (oracle_grid_install_option | default('CRS_CONFIG')) == 'CRS_CONFIG'
  changed_when: true

