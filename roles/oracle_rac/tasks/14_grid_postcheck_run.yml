---
# Step 14: runtime checks (libhasgen + crsctl stat + olsnodes) and validation.

- name: Import discovery/select logic (standalone step)
  ansible.builtin.import_tasks: 13_grid_postcheck_discover.yml
  when: crsctl_exec is not defined or olsnodes_exec is not defined or grid_home_effective is not defined

- name: Locate libhasgen.so for crsctl runtime
  ansible.builtin.shell: |
    set -e
    find "{{ grid_home_effective }}" -maxdepth 6 -type f -name libhasgen.so -print -quit 2>/dev/null || true
  args:
    executable: /bin/bash
  register: libhasgen_found
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: Derive LD_LIBRARY_PATH entries
  ansible.builtin.set_fact:
    libhasgen_dir: "{{ (libhasgen_found.stdout | trim | length > 0) | ternary(((libhasgen_found.stdout | trim) | dirname), '') }}"
  when: inventory_hostname == rac_primary_node

- name: Build ld_library_path value
  ansible.builtin.set_fact:
    ld_library_path: >-
      {{
        [libhasgen_dir, (grid_home_effective ~ '/lib'), (grid_home_effective ~ '/lib64')]
        | reject('equalto','')
        | join(':')
        ~ (ansible_env.LD_LIBRARY_PATH is defined and ansible_env.LD_LIBRARY_PATH|length > 0
          | ternary(':' ~ ansible_env.LD_LIBRARY_PATH, ''))
      }}
  when: inventory_hostname == rac_primary_node

- name: Run crsctl stat res -t (non-fatal for software-only installs)
  ansible.builtin.shell: "{{ crsctl_exec }} stat res -t"
  environment:
    ORACLE_HOME: "{{ grid_home_effective }}"
    GRID_HOME: "{{ grid_home_effective }}"
    LD_LIBRARY_PATH: "{{ ld_library_path }}"
    PATH: "{{ grid_home_effective }}/bin:{{ ansible_env.PATH | default('') }}"
  register: crsctl_stat_res
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: Run olsnodes -n (non-fatal for software-only installs)
  ansible.builtin.shell: "{{ olsnodes_exec }} -n"
  environment:
    ORACLE_HOME: "{{ grid_home_effective }}"
    GRID_HOME: "{{ grid_home_effective }}"
    LD_LIBRARY_PATH: "{{ ld_library_path }}"
    PATH: "{{ grid_home_effective }}/bin:{{ ansible_env.PATH | default('') }}"
  register: olsnodes_out
  changed_when: false
  failed_when: false
  when: inventory_hostname == rac_primary_node

- name: Validate CRS/clusterware expectations
  ansible.builtin.assert:
    that:
      - (crsctl_stat_res.rc | int == 0) or
        ('CRS-4047' in (crsctl_stat_res.stdout | default(''))) or
        ('CRS-4000' in (crsctl_stat_res.stdout | default(''))) or
        ('No Oracle Clusterware components configured' in (crsctl_stat_res.stdout | default('')))
      - (olsnodes_out.rc | int == 0) or
        ('PRCO-2' in (olsnodes_out.stdout | default(''))) or
        ('Unable to communicate with the clusterware' in (olsnodes_out.stdout | default('')))
    fail_msg: >-
      CRS checks failed unexpectedly.
      crsctl rc={{ crsctl_stat_res.rc }} stdout='{{ crsctl_stat_res.stdout | default('') }}'
      olsnodes rc={{ olsnodes_out.rc }} stdout='{{ olsnodes_out.stdout | default('') }}'
  when: inventory_hostname == rac_primary_node

