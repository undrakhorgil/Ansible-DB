---
# Step 20: create database with DBCA on primary node.

- name: Assert DBCA variables are set
  ansible.builtin.assert:
    that:
      - dbca_gdbname is defined
      - dbca_sid is defined
      - dbca_character_set is defined
      - dbca_sys_password is defined
      - dbca_system_password is defined
      - dbca_db_snmp_password is defined
      - dbca_pdb_admin_password is defined
      - dbca_data_diskgroup is defined
      - dbca_recovery_diskgroup is defined
    fail_msg: "Define dbca_* variables in group_vars/all.yml for step 20."
  when: inventory_hostname == rac_primary_node

# Documented in group_vars but previously not wired: clears partial CRS/DBCA/ASM paths that cause RMAN restore failures.
- name: Remove prior partial database install before DBCA (same as undo 20)
  ansible.builtin.import_tasks: undo_20_create_orcl_database.yml
  when: dbca_drop_existing_before_create | default(false) | bool

- name: Resolve SCAN IPs on primary node
  ansible.builtin.shell: |
    set -euo pipefail
    getent hosts "{{ rac_scan_name }}" | awk '{print $1}' | sort -u
  args:
    executable: /bin/bash
  register: scan_resolved_ips
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Assert SCAN resolves to configured SCAN IPs
  ansible.builtin.assert:
    that:
      - (scan_resolved_ips.stdout_lines | default([]) | length) >= 3
      - (rac_scan_ips | difference(scan_resolved_ips.stdout_lines | default([])) | length) == 0
    fail_msg: >-
      SCAN name resolution check failed for '{{ rac_scan_name }}'.
      Ensure '{{ rac_scan_name }}' resolves to all configured rac_scan_ips on the primary node before step 20.
  when: inventory_hostname == rac_primary_node

- name: Verify required ASM diskgroups exist before DBCA
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF ECHO OFF PAGESIZE 0
    WHENEVER SQLERROR EXIT SQL.SQLCODE
    SELECT UPPER(name) FROM v$asm_diskgroup
    WHERE UPPER(name) IN (UPPER('{{ dbca_data_diskgroup }}'), UPPER('{{ dbca_recovery_diskgroup }}'))
    ORDER BY 1;
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  register: asm_dg_precheck
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Assert ASM diskgroups are available for DBCA
  ansible.builtin.assert:
    that:
      - (dbca_data_diskgroup | upper) in (asm_dg_precheck.stdout | upper)
      - (dbca_recovery_diskgroup | upper) in (asm_dg_precheck.stdout | upper)
    fail_msg: >-
      Required ASM diskgroups are not available for DBCA.
      Ensure step 19 is complete (non-CRS groups), then rerun step 20.
  when: inventory_hostname == rac_primary_node

- name: Query ASM free_mb for DBCA data disk group
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF PAGESIZE 0
    WHENEVER SQLERROR EXIT SQL.SQLCODE
    SELECT TRIM(TO_CHAR(free_mb)) FROM v$asm_diskgroup WHERE UPPER(name) = UPPER('{{ dbca_data_diskgroup }}');
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  register: asm_free_mb_data_dg
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Query ASM free_mb for DBCA recovery disk group
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF PAGESIZE 0
    WHENEVER SQLERROR EXIT SQL.SQLCODE
    SELECT TRIM(TO_CHAR(free_mb)) FROM v$asm_diskgroup WHERE UPPER(name) = UPPER('{{ dbca_recovery_diskgroup }}');
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  register: asm_free_mb_rec_dg
  changed_when: false
  when: inventory_hostname == rac_primary_node

- name: Assert ASM free space before DBCA (avoid RMAN restore / space failures)
  ansible.builtin.assert:
    that:
      - asm_free_mb_data_dg.stdout | trim | int >= (dbca_asm_min_free_mb_data | default(4096) | int)
      - asm_free_mb_rec_dg.stdout | trim | int >= (dbca_asm_min_free_mb_fra | default(4096) | int)
    fail_msg: >-
      ASM free_mb too low: {{ dbca_data_diskgroup }}={{ asm_free_mb_data_dg.stdout | trim }} (need >= {{ dbca_asm_min_free_mb_data | default(4096) }}),
      {{ dbca_recovery_diskgroup }}={{ asm_free_mb_rec_dg.stdout | trim }} (need >= {{ dbca_asm_min_free_mb_fra | default(4096) }}).
      Grow disk groups or lower dbca_recovery_area_size_mb / dbca_asm_min_free_mb_* in group_vars.
  when: inventory_hostname == rac_primary_node

# Step 20-only runs may skip step 19; CRS can start ora.*.db before +DATA/+FRA are mounted (ORA-15001) without this.
- name: Import ASM SID facts for pre-DBCA mount
  ansible.builtin.import_tasks: asm_sid_facts.yml

- name: Mount all ASM disk groups on every node before DBCA
  ansible.builtin.import_tasks: mount_asm_diskgroups.yml

# RAC DBCA uses RMAN to place datafiles on peer nodes; oracle must SSH without password (BatchMode).
- name: Verify passwordless SSH for oracle from primary to each peer RAC node
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=20 "{{ item.name }}" hostname
  args:
    executable: /bin/bash
  loop: "{{ rac_nodes }}"
  when:
    - inventory_hostname == rac_primary_node
    - item.name != inventory_hostname
  register: dbca_oracle_ssh_peers

- name: Ensure Oracle admin directories exist for DBCA on all RAC nodes
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  loop:
    - "{{ oracle_base }}/admin"
    - "{{ oracle_base }}/admin/{{ dbca_sid }}"
    - "{{ oracle_base }}/admin/{{ dbca_sid }}/adump"
    - "{{ oracle_base }}/admin/{{ dbca_sid }}/dpdump"
    - "{{ oracle_base }}/admin/{{ dbca_sid }}/pfile"

# Unified audit default: ORACLE_BASE/audit/<db_unique_name><n> (e.g. ORCL1, ORCL2). Pre-create so DBCA does not hit ORA-48189.
- name: Ensure Oracle audit base directory exists on all RAC nodes
  become: true
  ansible.builtin.file:
    path: "{{ oracle_base }}/audit"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"

- name: Ensure per-instance audit directories exist on all RAC nodes
  become: true
  ansible.builtin.file:
    path: "{{ oracle_base }}/audit/{{ dbca_sid }}{{ item }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  loop: "{{ range(1, rac_nodes | length + 1) | list }}"

- name: Create database (DBCA silent)
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ oracle_home }}"
    export ORACLE_BASE="{{ oracle_base }}"
    export ORACLE_SID="{{ dbca_sid }}"
    export PATH="$ORACLE_HOME/bin:$PATH"

    timeout "{{ dbca_timeout_seconds | default(7200) }}" \
    "$ORACLE_HOME/bin/dbca" -silent -createDatabase \
      {{ '-ignorePreReqs' if (dbca_ignore_prereq_checks | default(false) | bool) else '' }} \
      -templateName General_Purpose.dbc \
      -gdbname "{{ dbca_gdbname }}" \
      -sid "{{ dbca_sid }}" \
      -createAsContainerDatabase true \
      -numberOfPDBs 1 \
      -pdbName "{{ dbca_pdb_name }}" \
      -characterSet "{{ dbca_character_set }}" \
      -sysPassword "{{ dbca_sys_password }}" \
      -systemPassword "{{ dbca_system_password }}" \
      -dbsnmpPassword "{{ dbca_db_snmp_password }}" \
      -pdbAdminPassword "{{ dbca_pdb_admin_password }}" \
      -storageType ASM \
      -diskGroupName "{{ dbca_data_diskgroup }}" \
      -recoveryAreaDestination "+{{ dbca_recovery_diskgroup }}" \
      -recoveryAreaSize "{{ dbca_recovery_area_size_mb }}" \
      -databaseConfigType RAC \
      -nodelist "{{ rac_nodes | map(attribute='name') | join(',') }}"
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  register: dbca_create
  failed_when: false

# Tell CRS which ASM DGs the DB needs so ora.*.db starts after ora.*.dg (avoids ORA-15001 on restart).
- name: Register database ASM disk group dependencies with CRS
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    srvctl modify database -db "{{ dbca_sid }}" -diskgroup "{{ dbca_data_diskgroup }},{{ dbca_recovery_diskgroup }}"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  register: dbca_srvctl_diskgroups
  changed_when: dbca_srvctl_diskgroups.rc == 0
  failed_when: false
  when:
    - inventory_hostname == rac_primary_node
    - dbca_create.rc | int == 0

- name: Collect DBCA log tail after failure (primary; run as root so log is readable)
  ansible.builtin.shell: |
    set -euo pipefail
    BASE="{{ oracle_base }}/cfgtoollogs/dbca"
    LOG=""
    for f in \
      "$BASE/{{ dbca_gdbname }}/{{ dbca_sid }}.log" \
      "$BASE/{{ dbca_gdbname }}/{{ dbca_gdbname }}.log" \
      "$BASE/{{ dbca_sid }}/{{ dbca_sid }}.log"; do
      if [[ -f "$f" ]]; then LOG="$f"; break; fi
    done
    if [[ -z "$LOG" ]] && command -v find >/dev/null; then
      LOG="$(find "$BASE" -maxdepth 4 -name '*.log' -type f 2>/dev/null | while read -r p; do
        printf '%s %s\n' "$(stat -c %Y "$p" 2>/dev/null || echo 0)" "$p"
      done | sort -rn | head -1 | awk '{print $2}')"
    fi
    if [[ -n "${LOG:-}" && -f "$LOG" ]]; then
      echo "--- tail of $LOG ---"
      tail -n 200 "$LOG" || true
    else
      echo "--- no DBCA log file found; listing $BASE ---"
      ls -la "$BASE" 2>/dev/null || true
      find "$BASE" -maxdepth 3 -type f 2>/dev/null | head -40 || true
    fi
  args:
    executable: /bin/bash
  become: true
  register: dbca_trace_tail
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == rac_primary_node
    - dbca_create.rc | int != 0

- name: Fail step 20 when DBCA timed out
  ansible.builtin.fail:
    msg: >-
      DBCA timed out after {{ dbca_timeout_seconds | default(7200) }} seconds.
      --- DBCA log tail ---
      {{ dbca_trace_tail.stdout | default('', true) }}
  when:
    - inventory_hostname == rac_primary_node
    - dbca_create.rc | int == 124

- name: Fail step 20 when DBCA returns error
  ansible.builtin.fail:
    msg: |
      DBCA failed with rc={{ dbca_create.rc }}.
      --- stdout ---
      {{ dbca_create.stdout | default('', true) }}
      --- stderr ---
      {{ dbca_create.stderr | default('', true) }}
      --- DBCA log tail ---
      {{ dbca_trace_tail.stdout | default('', true) }}
      ORA-15001 at startup: ensure all ASM DGs are mounted on every node before DBCA (step 20 imports mount_asm_diskgroups) and run srvctl modify database -diskgroup after a successful create.
      RMAN restore: oracle SSH to peers (step 7), undo-20 cleanup + free_mb,
      log: {{ oracle_base }}/cfgtoollogs/dbca/{{ dbca_gdbname }}/{{ dbca_sid }}.log
  when:
    - inventory_hostname == rac_primary_node
    - dbca_create.rc | int not in [0, 124]

