---
# Undo 20: drop RAC DB (CRS + DBCA + ASM) then remove local logs/config/diag on every node.

# --- Cluster operations (primary only) ---

- name: Undo 20 stop database if CRS still knows it
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    srvctl status database -d "{{ dbca_sid }}" &>/dev/null || exit 0
    srvctl stop database -d "{{ dbca_sid }}" -o immediate || true
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  failed_when: false
  changed_when: false

- name: Undo 20 drop database with DBCA (silent)
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ oracle_home }}"
    export ORACLE_BASE="{{ oracle_base }}"
    export PATH="{{ grid_home }}/bin:$ORACLE_HOME/bin:$PATH"
    unset ORACLE_SID
    if ! srvctl config database -d "{{ dbca_sid }}" &>/dev/null; then
      echo "CRS has no database {{ dbca_sid }}; skipping DBCA deleteDatabase."
      exit 0
    fi
    timeout "{{ dbca_undo_timeout_seconds | default(3600) }}" \
      "$ORACLE_HOME/bin/dbca" -silent -deleteDatabase \
      -sourceDB "{{ dbca_gdbname }}" \
      -sysDBAUserName sys \
      -sysDBAPassword "{{ dbca_sys_password }}" \
      || true
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  failed_when: false
  changed_when: false

- name: Undo 20 remove database from CRS
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    srvctl remove database -d "{{ dbca_sid }}" -deleterel force -noprompt || true
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  failed_when: false
  changed_when: false

- name: Undo 20 remove ASM database subtrees for db_unique_name (DATA/FRA)
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid | default('+ASM1') }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    DU="{{ dbca_gdbname }}"
    for p in \
      "+{{ dbca_data_diskgroup }}/${DU}" \
      "+{{ dbca_recovery_diskgroup }}/${DU}"; do
      if asmcmd ls "$p" &>/dev/null; then
        asmcmd rm -rf "$p" || true
      fi
    done
  args:
    executable: /bin/bash
  when:
    - inventory_hostname == rac_primary_node
    - undo_20_remove_asm_paths | default(true) | bool
  failed_when: false
  changed_when: false

# --- Every RAC node: Oracle Base / OH files tied to this DB ---

- name: Undo 20 remove database admin directory (all nodes)
  become: true
  ansible.builtin.file:
    path: "{{ oracle_base }}/admin/{{ dbca_sid }}"
    state: absent
  when: undo_20_clean_local_files | default(true) | bool

- name: Undo 20 remove DBCA cfgtoollogs for this database (all nodes)
  become: true
  ansible.builtin.file:
    path: "{{ oracle_base }}/cfgtoollogs/dbca/{{ dbca_gdbname }}"
    state: absent
  when: undo_20_clean_local_files | default(true) | bool

- name: Undo 20 remove ADR diag tree for this database (all nodes)
  become: true
  ansible.builtin.file:
    path: "{{ oracle_base }}/diag/rdbms/{{ dbca_gdbname | lower }}"
    state: absent
  when: undo_20_clean_local_files | default(true) | bool

- name: Undo 20 remove audit directories for instance(s) of this DB (all nodes)
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set +e
    rm -rf "{{ oracle_base }}/audit/{{ dbca_sid }}"*
  args:
    executable: /bin/bash
  when: undo_20_clean_local_files | default(true) | bool
  failed_when: false
  changed_when: false

- name: Undo 20 remove local ORACLE_HOME/dbs init/spfile/orapw for this SID (all nodes)
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set +e
    DBS="{{ oracle_home }}/dbs"
    rm -f "${DBS}/init{{ dbca_sid }}"*.ora "${DBS}/spfile{{ dbca_sid }}"*.ora "${DBS}/orapw{{ dbca_sid }}" "${DBS}/lk{{ dbca_sid }}" 2>/dev/null
    true
  args:
    executable: /bin/bash
  when: undo_20_clean_local_files | default(true) | bool
  failed_when: false
  changed_when: false

- name: Undo 20 remove oratab entry for this SID (all nodes)
  become: true
  ansible.builtin.lineinfile:
    path: /etc/oratab
    regexp: '^{{ dbca_sid | regex_escape }}:.*'
    state: absent
  when:
    - undo_20_clean_local_files | default(true) | bool
    - undo_20_clean_oratab | default(true) | bool
