---
- name: Configure RAC hosts block
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE RAC HOSTS"
    block: |
      {% for n in rac_nodes %}
      {{ n.public_ip }} {{ n.name }} {{ n.name }}.{{ rac_domain }}
      {{ n.private_ip }} {{ n.name }}-priv
      {{ n.vip_ip }} {{ n.vip_name }}
      {% endfor %}
      {% for ip in rac_scan_ips %}
      {{ ip }} {{ rac_scan_name }}
      {% endfor %}
