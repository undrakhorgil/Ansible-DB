---
# Grid media: unzip on primary only using oracle_grid_software_zip from group_vars.

- name: Check configured Grid zip exists on primary
  ansible.builtin.stat:
    path: "{{ oracle_grid_software_zip }}"
  register: grid_zip_stat
  when: inventory_hostname == rac_primary_node

- name: Fail if configured Grid zip is missing
  ansible.builtin.assert:
    that:
      - grid_zip_stat.stat.exists
    fail_msg: >-
      Configured Grid zip not found: {{ oracle_grid_software_zip }}.
      Fix group_vars/all.yml oracle_grid_software_zip path.
  when: inventory_hostname == rac_primary_node

- name: Ensure GRID_HOME exists before unzip (unarchive requires dest dir; also covers undo 8 emptying path)
  ansible.builtin.file:
    path: "{{ grid_home }}"
    state: directory
    owner: "{{ grid_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == rac_primary_node

- name: Unzip grid software on primary
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.unarchive:
    src: "{{ oracle_grid_software_zip }}"
    dest: "{{ grid_home }}"
    remote_src: true
  when: inventory_hostname == rac_primary_node

- name: Enforce grid ownership on extracted GI home
  become: true
  ansible.builtin.file:
    path: "{{ grid_home }}"
    state: directory
    owner: "{{ grid_user }}"
    group: "{{ oinstall_group }}"
    recurse: true
  when: inventory_hostname == rac_primary_node

