---
# Step 8 = unzip GI media. Undo = clear GRID_HOME contents (keep empty dir) so step 8 can unzip again.
# Run undo 10 first if cluster exists — this is not deinstall; it deletes extracted files only.
- name: Undo 08 clear GI home contents on all nodes (keep GRID_HOME directory)
  ansible.builtin.shell: |
    set -e
    GH="{{ grid_home }}"
    [ -d "$GH" ] || exit 0
    find "$GH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
  args:
    executable: /bin/bash
  failed_when: false
  changed_when: true

- name: Undo 08 clear Grid locators after GI tree removal
  ansible.builtin.import_tasks: cleanup_grid_install_state.yml
