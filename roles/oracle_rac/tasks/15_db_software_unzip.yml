---
# Step 15: unzip DB software into oracle_home.

- name: Ensure DB oracle_home directory exists (not created under ORACLE_BASE early — avoids INS-40109)
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == rac_primary_node

- name: Unzip DB software into oracle_home
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    unzip -oq "{{ oracle_db_software_zip }}" -d "{{ oracle_home }}"
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node

