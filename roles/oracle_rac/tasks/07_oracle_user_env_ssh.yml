---
# Oracle path dirs: step 4 only. This step: passwords, home perms, SSH, hostname, known_hosts.
- name: Set lab OS passwords for oracle and grid (sshpass/CVU helpers)
  ansible.builtin.shell: |
    set -e
    echo '{{ item.user }}:{{ item.pass }}' | chpasswd
  args:
    executable: /bin/bash
  loop:
    - { user: "{{ oracle_user }}", pass: "{{ oracle_user_password_new }}" }
    - { user: "{{ grid_user }}", pass: "{{ grid_user_password_new }}" }
  no_log: true
  changed_when: false

- name: Ensure strict home permissions for SSH users
  ansible.builtin.file:
    path: "/home/{{ item }}"
    state: directory
    owner: "{{ item }}"
    group: "{{ oinstall_group }}"
    mode: "0700"
  loop:
    - "{{ oracle_user }}"
    - "{{ grid_user }}"

- name: Prepare SSH directories for Oracle/Grid users
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh"
    state: directory
    owner: "{{ item }}"
    group: "{{ oinstall_group }}"
    mode: "0700"
  loop:
    - "{{ oracle_user }}"
    - "{{ grid_user }}"

- name: Align system hostname with RAC cluster node name (INS-44015 / CVU self-check)
  ansible.builtin.command: hostnamectl set-hostname "{{ inventory_hostname }}"
  when: inventory_hostname in (rac_nodes | map(attribute='name') | list)
  changed_when: true

- name: Capture local hostname -s (Oracle may ssh using this)
  ansible.builtin.command: hostname -s
  register: grid_ssh_hostname_short
  changed_when: false

- name: Capture local hostname -f (Oracle may ssh using FQDN)
  ansible.builtin.command: hostname -f
  register: grid_ssh_hostname_fqdn
  changed_when: false

- name: Assert hostname -s matches RAC inventory (ssh $(hostname) / CVU self-check)
  ansible.builtin.assert:
    that:
      - (grid_ssh_hostname_short.stdout | trim) == inventory_hostname
    fail_msg: >-
      This host's short name is '{{ grid_ssh_hostname_short.stdout | trim }}' but inventory_hostname is '{{ inventory_hostname }}'.
      Run step 5 (hosts), then: hostnamectl set-hostname {{ inventory_hostname }}.
      If hostname -f still fails SSH, set rac_domain in group_vars to match your domain and re-run step 5.

- name: Ensure RSA keys exist for Oracle/Grid users
  ansible.builtin.shell: |
    set -e
    H="/home/{{ item }}/.ssh"
    [ -f "$H/id_rsa" ] || ssh-keygen -t rsa -b 2048 -N "" -f "$H/id_rsa" -C "{{ item }}@{{ inventory_hostname }}"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop:
    - "{{ oracle_user }}"
    - "{{ grid_user }}"

- name: Read grid public key
  ansible.builtin.command: cat /home/{{ grid_user }}/.ssh/id_rsa.pub
  become: true
  become_user: "{{ grid_user }}"
  register: grid_ssh_pubkey
  changed_when: false

- name: Read oracle public key
  ansible.builtin.command: cat /home/{{ oracle_user }}/.ssh/id_rsa.pub
  become: true
  become_user: "{{ oracle_user }}"
  register: oracle_ssh_pubkey
  changed_when: false

- name: Install SSH defaults for grid
  ansible.builtin.copy:
    dest: /home/{{ grid_user }}/.ssh/config
    owner: "{{ grid_user }}"
    group: "{{ oinstall_group }}"
    mode: "0600"
    content: |
      Host *
        StrictHostKeyChecking no
        GSSAPIAuthentication no
        PreferredAuthentications publickey
        PubkeyAuthentication yes
        ConnectTimeout 30

- name: Install SSH defaults for oracle
  ansible.builtin.copy:
    dest: /home/{{ oracle_user }}/.ssh/config
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0600"
    content: |
      Host *
        StrictHostKeyChecking no
        GSSAPIAuthentication no
        PreferredAuthentications publickey
        PubkeyAuthentication yes
        ConnectTimeout 30

# CVU / runcluvfy requires this path to exist (PRVF-5311); do not point UserKnownHostsFile to /dev/null only.
- name: Ensure known_hosts file exists for grid and oracle (CVU PRVF-5311)
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh/known_hosts"
    state: touch
    owner: "{{ item }}"
    group: "{{ oinstall_group }}"
    mode: "0600"
  loop:
    - "{{ grid_user }}"
    - "{{ oracle_user }}"

- name: Authorize grid passwordless SSH between all RAC nodes (includes self)
  ansible.posix.authorized_key:
    user: "{{ grid_user }}"
    state: present
    key: "{{ hostvars[item].grid_ssh_pubkey.stdout | trim }}"
    manage_dir: true
  loop: "{{ groups['oracle_rac_servers'] }}"

- name: Authorize oracle passwordless SSH between all RAC nodes (includes self)
  ansible.posix.authorized_key:
    user: "{{ oracle_user }}"
    state: present
    key: "{{ hostvars[item].oracle_ssh_pubkey.stdout | trim }}"
    manage_dir: true
  loop: "{{ groups['oracle_rac_servers'] }}"

- name: Enforce authorized_keys permissions
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh/authorized_keys"
    state: file
    owner: "{{ item }}"
    group: "{{ oinstall_group }}"
    mode: "0600"
  loop:
    - "{{ grid_user }}"
    - "{{ oracle_user }}"

- name: Restore SELinux context on .ssh
  ansible.builtin.command: restorecon -RF "/home/{{ item }}/.ssh"
  loop:
    - "{{ grid_user }}"
    - "{{ oracle_user }}"
  changed_when: true
  failed_when: false

# CVU invokes /usr/bin/ssh with strict host key checking; empty known_hosts causes PRKC-1191 on peer nodes.
- name: Build host list for ssh-keyscan (all RAC names/IPs + FQDN + interconnect)
  ansible.builtin.set_fact:
    _cluvfy_ssh_keyscan_hosts: >-
      {{
        (
          rac_nodes | map(attribute='name') | list
          + (rac_nodes | map(attribute='name') | map('regex_replace', '$', '.' + rac_domain) | list)
          + rac_nodes | map(attribute='public_ip') | list
          + rac_nodes | map(attribute='private_ip') | list
          + (rac_nodes | map(attribute='name') | map('regex_replace', '$', '-priv') | list)
          + ['localhost', '127.0.0.1']
        ) | unique | list
      }}

- name: Prime known_hosts with ssh-keyscan for grid and oracle (CVU PRKC-1191)
  ansible.builtin.shell: |
    set -e
    H="/home/{{ item }}/.ssh/known_hosts"
    : > "$H"
    for t in {{ _cluvfy_ssh_keyscan_hosts | join(' ') }}; do
      ssh-keyscan -T 15 -t rsa,ecdsa,ed25519 "$t" 2>/dev/null >> "$H" || true
    done
    chmod 600 "$H"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ item }}"
  loop:
    - "{{ grid_user }}"
    - "{{ oracle_user }}"

# VIP / SCAN names belong in /etc/hosts (05_hosts_sync); they are not SSH BatchMode targets.
- name: Build grid SSH targets for GI installer checks
  ansible.builtin.set_fact:
    grid_ssh_batchmode_targets: >-
      {{
        (
          rac_nodes | map(attribute='name') | list
          + (rac_nodes | map(attribute='name') | map('regex_replace', '$', '-priv') | list)
          + rac_nodes | map(attribute='public_ip') | list
          + rac_nodes | map(attribute='private_ip') | list
          + [grid_ssh_hostname_short.stdout, grid_ssh_hostname_fqdn.stdout, 'localhost', '127.0.0.1']
          + (groups['oracle_rac_servers'] | map('extract', hostvars) | map(attribute='grid_ssh_hostname_short') | map(attribute='stdout', default='') | list)
          + (groups['oracle_rac_servers'] | map('extract', hostvars) | map(attribute='grid_ssh_hostname_fqdn') | map(attribute='stdout', default='') | list)
        ) | unique | reject('equalto', '') | list
      }}
# BatchMode SSH check runs once in 10_grid_config (before gridSetup), not here.
