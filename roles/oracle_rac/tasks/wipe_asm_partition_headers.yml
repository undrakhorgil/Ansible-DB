---
# Oracle reports INS-30530 when partitions still have MEMBER/other ASM header state from a failed install.
# Zeroing the first N MiB makes disks appear as CANDIDATE again. Run once on primary (shared storage).
- name: Wipe stale ASM partition headers (INS-30530)
  ansible.builtin.shell: |
    set -euo pipefail
    {% if s.id_path is defined %}
    idp="{{ s.id_path }}"
    if [[ "$idp" =~ -part[0-9]+$ ]]; then
      p="/dev/disk/by-path/$idp"
    else
      p="/dev/disk/by-path/${idp}-part1"
    fi
    {% else %}
    p="{{ s.device }}1"
    {% endif %}
    if [ ! -b "$p" ]; then
      echo "skip (not a block device): $p"
      exit 0
    fi
    echo "Wiping ASM header region on $p (first {{ asm_wipe_header_mb | default(50) }} MiB)"
    dd if=/dev/zero of="$p" bs=1M count={{ asm_wipe_header_mb | default(50) }} conv=fsync
  args:
    executable: /bin/bash
  loop: "{{ asm_symlinks }}"
  loop_control:
    loop_var: s
  when:
    - inventory_hostname == rac_primary_node
    - asm_wipe_stale_headers | default(true)
  become: true
