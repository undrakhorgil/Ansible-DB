---
# Step 10.3: executeConfigTools (finish CRS config)

- name: Ensure xdpyinfo exists for executeConfigTools
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v xdpyinfo >/dev/null 2>&1; then
      exit 0
    fi
    if command -v dnf >/dev/null 2>&1; then
      dnf -y install xorg-x11-utils
    else
      yum -y install xorg-x11-utils
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: root
  when:
    - inventory_hostname == rac_primary_node
    - (oracle_grid_install_option | default('CRS_CONFIG')) == 'CRS_CONFIG'
  changed_when: true

- name: Check CRS is already up (skip executeConfigTools when configured)
  ansible.builtin.shell: |
    set -euo pipefail
    export PATH="{{ grid_home }}/bin:${PATH:-}"
    "{{ grid_home }}/bin/crsctl" stat res -t
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  environment:
    ORACLE_HOME: "{{ grid_home }}"
    GRID_HOME: "{{ grid_home }}"
  register: crsctl_stat_res
  changed_when: false
  failed_when: false
  when:
    - inventory_hostname == rac_primary_node
    - (oracle_grid_install_option | default('CRS_CONFIG')) == 'CRS_CONFIG'

- name: Run GI executeConfigTools (finish CRS config)
  ansible.builtin.shell: |
    set -euo pipefail
    # INS-45514: -executeConfigTools requires the response file produced by the prior gridSetup session.
    RSP_FILE="$(ls -1t "{{ grid_home }}/install/response"/grid_*.rsp 2>/dev/null | head -n1 || true)"
    if [ -z "$RSP_FILE" ]; then
      RSP_FILE="$(ls -1t "{{ grid_home }}/response"/grid_*.rsp 2>/dev/null | head -n1 || true)"
    fi
    if [ -z "$RSP_FILE" ]; then
      echo "No session grid_*.rsp found under {{ grid_home }}. Re-run step 10 (gridSetup) first." >&2
      exit 1
    fi
    echo "executeConfigTools using responseFile: $RSP_FILE"
    "{{ grid_home }}/gridSetup.sh" -silent -waitforcompletion -ignorePrereq -executeConfigTools -responseFile "$RSP_FILE"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  environment:
    DISPLAY: ""
  when:
    - inventory_hostname == rac_primary_node
    - (oracle_grid_install_option | default('CRS_CONFIG')) == 'CRS_CONFIG'
    - crsctl_stat_res.rc != 0
  changed_when: true

