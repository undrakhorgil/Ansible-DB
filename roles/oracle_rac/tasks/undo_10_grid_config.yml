---
# Step 10 = gridSetup / cluster config. Undo = Oracle-supported deinstall only — do NOT rm GRID_HOME here.
# After deinstall succeeds, use undo 8 (or manual rm) to remove leftover GI files if needed.
- name: Undo 10 best-effort Grid Infrastructure deinstall (deinstall/deinstall)
  ansible.builtin.shell: |
    set -e
    D="{{ grid_home }}/deinstall/deinstall"
    if [ -x "$D" ]; then
      "$D" -silent -local || true
    else
      echo "No executable $D — nothing to deinstall (GI may be missing or path wrong)." >&2
      exit 0
    fi
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  failed_when: false
  changed_when: true

- name: Undo 10 remove stale Grid metadata (inventory + /etc/oracle + oraInst.loc on all nodes)
  ansible.builtin.import_tasks: cleanup_grid_install_state.yml
