---
# Generate the report on the Ansible control host (this repo), not on RAC nodes.
# Output goes into the project root by default (one level above playbook_dir).
- name: Set local summary output path (control host)
  ansible.builtin.set_fact:
    rac_summary_html_local_path: "{{ playbook_dir }}/../rac_environment_summary.html"
  run_once: true
  when: inventory_hostname == rac_primary_node

- name: Ensure local summary output directory exists (control host)
  ansible.builtin.file:
    path: "{{ rac_summary_html_local_path | dirname }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
  run_once: true
  when: inventory_hostname == rac_primary_node

- name: Gather minimal facts on control host for summary (ansible_date_time)
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - min
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
  run_once: true
  when: inventory_hostname == rac_primary_node

- name: Render RAC HTML summary report (control host)
  ansible.builtin.template:
    src: rac_summary.html.j2
    dest: "{{ rac_summary_html_local_path }}"
    mode: "0644"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
  run_once: true
  when: inventory_hostname == rac_primary_node
