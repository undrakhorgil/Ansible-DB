---
# Step 19: create non-CRS ASM disk groups (DATA/FRA/custom) from asm_diskgroups.

- name: Import ASM SID facts for this host
  ansible.builtin.import_tasks: asm_sid_facts.yml

- name: Skip ASM diskgroup creation when no disks configured
  ansible.builtin.debug:
    msg: "Skipping ASM diskgroup creation — set asm_diskgroups[*] with used_for_grid_crs: false and disks in group_vars/all.yml."
  when:
    - inventory_hostname == rac_primary_node
    - ((asm_diskgroups | default([]) | rejectattr('used_for_grid_crs', 'equalto', true) | selectattr('disks', 'defined') | map(attribute='disks') | map('length') | list | sum) | int) == 0

- name: Create configured ASM disk groups (sqlplus as SYSASM, primary node)
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid_for_node }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF ECHO OFF PAGESIZE 0
    WHENEVER SQLERROR EXIT SQL.SQLCODE
    CREATE DISKGROUP {{ dg.name }} {{ dg.redundancy | default('EXTERNAL') }} REDUNDANCY
    {% for d in dg.disks %}
    DISK '{{ d }}' NAME {{ dg.name | lower }}_{{ '%04d' | format(loop.index0) }}{{ ',' if not loop.last else '' }}
    {% endfor %}
    ;
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  register: asm_dg_create
  loop: "{{ asm_diskgroups | default([]) }}"
  loop_control:
    loop_var: dg
    label: "{{ dg.name }}"
  # ORA-15033: disk already in this disk group — DG exists; idempotent re-run after partial undo / leftover membership.
  changed_when: >-
    asm_dg_create.rc == 0
    and ('ORA-15033' not in (asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')))
  failed_when: >-
    asm_dg_create.rc | int != 0
    and ('ORA-15084' not in (asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')))
    and ('ORA-15039' not in (asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')))
    and ('ORA-15030' not in (asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')))
    and ('already' not in ((asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')) | lower))
    and not (
      ('ORA-15033' in (asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')))
      and (('"' + (dg.name | upper) + '"') in ((asm_dg_create.stdout | default('') + asm_dg_create.stderr | default('')) | upper))
    )
  when:
    - inventory_hostname == rac_primary_node
    - not (dg.used_for_grid_crs | default(false) | bool)
    - (dg.disks | default([]) | length) > 0

- name: Mount all configured ASM disk groups on all nodes
  ansible.builtin.import_tasks: mount_asm_diskgroups.yml
