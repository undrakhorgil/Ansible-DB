---
# Step 7: SSH/passwords/hostname only — do not remove /u01 Oracle dirs here (those are step 4 / undo 4).

- name: Undo 07 remove SSH client config from step 7
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh/config"
    state: absent
  loop:
    - "{{ grid_user }}"
    - "{{ oracle_user }}"
  failed_when: false
  changed_when: false
