---
# Step 17: run DB root.sh on RAC nodes after DB software install.

- name: Check DB root.sh exists
  ansible.builtin.stat:
    path: "{{ oracle_home }}/root.sh"
  register: db_rootsh_stat
  when: inventory_hostname in (groups['oracle_rac_servers'] | default([]))

- name: Run DB root.sh
  ansible.builtin.shell: |
    set -euo pipefail
    "{{ oracle_home }}/root.sh"
  args:
    executable: /bin/bash
  become: true
  become_user: root
  when:
    - inventory_hostname in (groups['oracle_rac_servers'] | default([]))
    - db_rootsh_stat.stat.exists
  changed_when: true

- name: Fail if DB root.sh is missing
  ansible.builtin.assert:
    that:
      - db_rootsh_stat.stat.exists
    fail_msg: >-
      {{ oracle_home }}/root.sh not found on {{ inventory_hostname }}.
      Run step 16 (DB software install) first.
  when: inventory_hostname in (groups['oracle_rac_servers'] | default([]))

