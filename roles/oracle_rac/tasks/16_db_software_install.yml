---
# Step 16: run DB runInstaller from oracle_home (Oracle requirement).

- name: Ensure DB oracle_home directory exists (not created under ORACLE_BASE early — avoids INS-40109)
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == rac_primary_node

- name: Run DB software-only install
  become: true
  become_user: "{{ oracle_user }}"
  ansible.builtin.shell: >
    {{ oracle_home }}/runInstaller -ignorePrereq -waitforcompletion -silent
    -responseFile {{ oracle_home }}/install/response/db_install.rsp
    installOption=INSTALL_DB_SWONLY
    UNIX_GROUP_NAME={{ oinstall_group }}
    INVENTORY_LOCATION={{ oracle_inventory }}
    ORACLE_HOME={{ oracle_home }}
    ORACLE_BASE={{ oracle_base }}
    installEdition=EE
    OSDBA={{ dba_group }}
    OSBACKUPDBA={{ dba_group }}
    OSDGDBA={{ dba_group }}
    OSKMDBA={{ dba_group }}
    OSRACDBA={{ dba_group }}
    clusterNodes={{ rac_nodes | map(attribute='name') | join(',') }}
    dbType=GENERAL_PURPOSE
  args:
    executable: /bin/bash
  register: db_install_run
  # Oracle runInstaller may return rc=6 for "success with warning(s)".
  failed_when: >-
    (db_install_run.rc | int != 0)
    and ('Successfully Setup Software with warning(s).' not in (db_install_run.stdout | default('')))
  when: inventory_hostname == rac_primary_node

- name: Show DB install warning status (non-fatal)
  ansible.builtin.debug:
    msg:
      - "DB software install completed with warnings (rc={{ db_install_run.rc }})."
      - "Run as root on all RAC nodes: {{ oracle_home }}/root.sh"
  when:
    - inventory_hostname == rac_primary_node
    - db_install_run is defined
    - (db_install_run.rc | int != 0)
    - "'Successfully Setup Software with warning(s).' in (db_install_run.stdout | default(''))"

