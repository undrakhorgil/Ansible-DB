---
- name: Configure RAC hosts block early (required for no-DNS environments)
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE RAC HOSTS"
    block: |
      {% for n in rac_nodes %}
      {{ n.public_ip }} {{ n.name }} {{ n.name }}.{{ rac_domain }}
      {{ n.private_ip }} {{ n.name }}-priv
      {{ n.vip_ip }} {{ n.vip_name }}
      {% endfor %}
      {% for ip in rac_scan_ips %}
      {{ ip }} {{ rac_scan_name }}
      {% endfor %}

- name: Validate RAC topology variables
  ansible.builtin.assert:
    that:
      - rac_nodes | length >= 2
      - rac_scan_ips | length >= 1
      - rac_scan_name | length > 0

- name: Ensure this host exists in rac_nodes
  ansible.builtin.assert:
    that:
      - inventory_hostname in (rac_nodes | map(attribute='name') | list)

- name: Check SCAN resolution
  ansible.builtin.command: "getent hosts {{ rac_scan_name }}"
  register: scan_resolution
  changed_when: false
  failed_when: false

- name: Assert SCAN resolves in step 1
  ansible.builtin.assert:
    that:
      - scan_resolution.rc == 0
      - scan_resolution.stdout_lines | length >= (rac_scan_ips | length)
    fail_msg: >-
      SCAN '{{ rac_scan_name }}' is not resolvable after /etc/hosts sync in step 1.
      getent rc={{ scan_resolution.rc }}, output='{{ scan_resolution.stdout | default('') }}'
