---
# Step 10.1: gridSetup.sh silent install/config (CRS_SWONLY or CRS_CONFIG)

- name: Ensure SCAN name resolves (required for CRS_CONFIG)
  ansible.builtin.import_tasks: 05_hosts_sync.yml

- name: Assert required gridSetup variables are explicitly set
  ansible.builtin.assert:
    that:
      - oracle_grid_install_option is defined
      - oracle_grid_rootconfig_executeRootScript is defined
      - oracle_grid_network_interface_list is defined
      - grid_asm_disk_discovery_string is defined
    fail_msg: >-
      Missing required variables for step 10. Define them in group_vars/all.yml
      (no default fallbacks are used).
  when: inventory_hostname == rac_primary_node

- name: Ensure ORACLE_BASE exists (installer expects it)
  ansible.builtin.file:
    path: "{{ oracle_base }}"
    state: directory
    owner: "{{ grid_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == rac_primary_node

- name: Ensure ORACLE_BASE is empty for CRS_CONFIG reruns
  ansible.builtin.assert:
    that:
      - oracle_base is defined
      - oracle_base | trim | length > 1
      - oracle_base.startswith('/u01/')
      - oracle_base != '/'
    fail_msg: >-
      Refusing to wipe oracle_base='{{ oracle_base }}'. For safety, oracle_base must start with /u01/ and not be '/'.
  when: oracle_grid_install_option == 'CRS_CONFIG'

- name: Ensure ORACLE_BASE is empty for CRS_CONFIG reruns
  ansible.builtin.shell: |
    set -euo pipefail
    mkdir -p "{{ oracle_base }}"
    # Installer requires Oracle base to be empty for fresh CRS_CONFIG runs.
    find "{{ oracle_base }}" -mindepth 1 -exec rm -rf {} +
  args:
    executable: /bin/bash
  become: true
  become_user: root
  when: oracle_grid_install_option == 'CRS_CONFIG'

- name: Assert ORACLE_BASE is empty before gridSetup (CRS_CONFIG)
  ansible.builtin.shell: |
    set -euo pipefail
    ls -A "{{ oracle_base }}" 2>/dev/null | head -n 1
  args:
    executable: /bin/bash
  register: oracle_base_nonempty
  changed_when: false
  failed_when: oracle_base_nonempty.stdout_lines | length > 0
  when:
    - inventory_hostname == rac_primary_node
    - oracle_grid_install_option == 'CRS_CONFIG'

- name: Ensure oraInventory exists before gridSetup
  ansible.builtin.file:
    path: "{{ oracle_inventory }}"
    state: directory
    owner: "{{ grid_user }}"
    group: "{{ oinstall_group }}"
    mode: "0775"
  when: inventory_hostname == rac_primary_node

- name: Clean stale Grid metadata before gridSetup (inventory + /etc/oracle on all nodes)
  ansible.builtin.import_tasks: cleanup_grid_install_state.yml

- name: Wipe stale ASM headers before gridSetup (INS-30530)
  ansible.builtin.import_tasks: wipe_asm_partition_headers.yml

- name: Set GI networkInterfaceList from variable override (optional)
  ansible.builtin.set_fact:
    gi_network_interface_list: "{{ oracle_grid_network_interface_list }}"
  when:
    - inventory_hostname == rac_primary_node
    - oracle_grid_network_interface_list | length > 0

- name: Discover public and private NICs for GI networkInterfaceList
  ansible.builtin.shell: |
    set -euo pipefail
    PUB_IP="{{ (rac_nodes | selectattr('name', 'equalto', rac_primary_node) | first).public_ip }}"
    PRIV_IP="{{ (rac_nodes | selectattr('name', 'equalto', rac_primary_node) | first).private_ip }}"
    iface_for_ip() {
      ip -o -4 addr show | awk -v ip="$1" '$4 ~ "^" ip "/" { print $2; exit }'
    }
    pub_if=$(iface_for_ip "$PUB_IP")
    priv_if=$(iface_for_ip "$PRIV_IP")
    echo "${pub_if}|${priv_if}"
  args:
    executable: /bin/bash
  register: gi_iface_detect
  changed_when: false
  when:
    - inventory_hostname == rac_primary_node
    - oracle_grid_network_interface_list | length == 0

- name: Assert public and private interfaces are usable for GI
  ansible.builtin.assert:
    that:
      - (gi_iface_detect.stdout.split('|')[0] | trim) | length > 0
      - (gi_iface_detect.stdout.split('|')[1] | trim) | length > 0
      - (gi_iface_detect.stdout.split('|')[0] | trim) != (gi_iface_detect.stdout.split('|')[1] | trim)
    fail_msg: >-
      Public/private IPs mapped to same interface ({{ gi_iface_detect.stdout | trim }}).
      Set `oracle_grid_network_interface_list` in group_vars to skip discovery.
  when:
    - inventory_hostname == rac_primary_node
    - oracle_grid_network_interface_list | length == 0

- name: Build GI networkInterfaceList from discovered NICs
  ansible.builtin.set_fact:
    gi_network_interface_list: "{{ (gi_iface_detect.stdout.split('|')[0] | trim) }}:{{ rac_public_subnet }}:{{ rac_grid_network_iface_role_public }},{{ (gi_iface_detect.stdout.split('|')[1] | trim) }}:{{ rac_private_subnet }}:{{ rac_grid_network_iface_role_private }}"
  when:
    - inventory_hostname == rac_primary_node
    - oracle_grid_network_interface_list | length == 0

- name: Assert one asm_diskgroups entry is flagged for grid CRS
  ansible.builtin.assert:
    that:
      - asm_diskgroups is defined
      - (asm_diskgroups | length) > 0
      - (asm_diskgroups | selectattr('used_for_grid_crs', 'defined') | selectattr('used_for_grid_crs', 'equalto', true) | list | length) == 1
    fail_msg: >-
      Step 10 requires exactly one asm_diskgroups entry with used_for_grid_crs: true in group_vars/all.yml.
  when:
    - inventory_hostname == rac_primary_node

- name: Set grid CRS diskgroup from flagged asm_diskgroups entry
  ansible.builtin.set_fact:
    gi_crs_diskgroup: "{{ (asm_diskgroups | selectattr('used_for_grid_crs', 'defined') | selectattr('used_for_grid_crs', 'equalto', true) | list | first) }}"
  when:
    - inventory_hostname == rac_primary_node

- name: Assert flagged grid CRS diskgroup is fully configured
  ansible.builtin.assert:
    that:
      - gi_crs_diskgroup.name is defined
      - (gi_crs_diskgroup.name | trim | length) > 0
      - gi_crs_diskgroup.redundancy is defined
      - (gi_crs_diskgroup.redundancy | trim | length) > 0
      - gi_crs_diskgroup.disks is defined
      - (gi_crs_diskgroup.disks | length) > 0
    fail_msg: >-
      The diskgroup flagged with used_for_grid_crs: true must include name/redundancy/disks.
  when:
    - inventory_hostname == rac_primary_node

- name: Set GI install diskgroup variables
  ansible.builtin.set_fact:
    gi_install_dg_name: "{{ gi_crs_diskgroup.name }}"
    gi_install_dg_redundancy: "{{ gi_crs_diskgroup.redundancy }}"
    gi_asm_disk_list: "{% for d in gi_crs_diskgroup.disks %}{{ d }}{% if not loop.last %},{% endif %}{% endfor %}"
  when:
    - inventory_hostname == rac_primary_node

- name: Verify ASM block devices exist before gridSetup
  ansible.builtin.shell: |
    set -e
    IFS=',' read -ra DISKS <<< "{{ gi_asm_disk_list }}"
    for p in "${DISKS[@]}"; do
      p="${p#"${p%%[![:space:]]*}"}"
      p="${p%"${p##*[![:space:]]}"}"
      [ -b "$p" ] || { echo "Not a block device: $p" >&2; exit 1; }
    done
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node

- name: Assert rac_nodes is non-empty for gridSetup
  ansible.builtin.assert:
    that:
      - rac_nodes is defined
      - (rac_nodes | length) > 0
      - (rac_nodes | selectattr('role', 'undefined') | list | length) == 0
      - (rac_nodes | selectattr('vip_name', 'undefined') | list | length) == 0
    fail_msg: "Define rac_nodes in group_vars with at least one cluster host entry."
  when: inventory_hostname == rac_primary_node

- name: Build GI clusterNodes from rac_nodes (dynamic N-node)
  ansible.builtin.set_fact:
    gi_cluster_nodes: "{% for n in rac_nodes %}{{ n.name }}:{{ n.vip_name }}:{{ n.role }}{% if not loop.last %},{% endif %}{% endfor %}"
  when:
    - inventory_hostname == rac_primary_node
    - rac_nodes is defined
    - (rac_nodes | length) > 0

- name: Run gridSetup.sh (silent)
  become: true
  become_user: "{{ grid_user }}"
  ansible.builtin.shell: |
    set -euo pipefail
    GS="{{ grid_home }}/gridSetup.sh"
    export HOME="/home/{{ grid_user }}"
    export ORACLE_HOME="{{ grid_home }}"
    export GRID_HOME="{{ grid_home }}"
    export ORACLE_BASE="{{ oracle_base }}"
    export PATH="{{ grid_home }}/bin:${PATH:-}"
    cmd=(/bin/bash "$GS" -ignorePrereq -waitforcompletion -silent)

    cmd+=(
      oracle.install.option={{ oracle_grid_install_option | string }}
      oracle.install.crs.rootconfig.executeRootScript={{ (oracle_grid_rootconfig_executeRootScript | string) | lower }}

      INVENTORY_LOCATION="{{ oracle_inventory }}"
      ORACLE_BASE="{{ oracle_base }}"

      oracle.install.crs.config.gpnp.scanName="{{ rac_scan_name }}"
      oracle.install.crs.config.gpnp.scanPort="{{ rac_scan_port }}"
      oracle.install.crs.config.ClusterConfiguration=STANDALONE
      oracle.install.crs.config.clusterName="{{ rac_cluster_name }}"
      oracle.install.crs.config.clusterNodes="{{ gi_cluster_nodes }}"
      oracle.install.crs.config.networkInterfaceList="{{ gi_network_interface_list }}"

      oracle.install.asm.OSASM="{{ asmadmin_group }}"
      oracle.install.asm.OSDBA="{{ asmdba_group }}"
      oracle.install.asm.OSOPER="{{ asmoper_group }}"

      oracle.install.asm.diskGroup.name="{{ gi_install_dg_name }}"
      oracle.install.asm.diskGroup.redundancy={{ gi_install_dg_redundancy }}
      oracle.install.asm.diskGroup.disks="{{ gi_asm_disk_list }}"
      oracle.install.asm.diskGroup.diskDiscoveryString={{ grid_asm_disk_discovery_string | quote }}

      oracle.install.asm.SYSASMPassword="{{ sys_password }}"
      oracle.install.asm.monitorPassword="{{ sys_password }}"
    )

    unset CV_DESTLOC_OVERRIDE CV_DESTLOC_OVERRIDE_OLD CV_DESTLOC 2>/dev/null || true
    exec "${cmd[@]}"
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  register: gi_setup_run
  failed_when: gi_setup_run.rc not in [0, 6]

