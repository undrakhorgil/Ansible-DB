---
# Undo 15: clear DB home contents but keep the folder.
- name: Undo 15 clear DB home contents (keep folder)
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -d "{{ oracle_home }}" ]; then
      find "{{ oracle_home }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
    fi
  args:
    executable: /bin/bash
  when: inventory_hostname == rac_primary_node
  changed_when: true

