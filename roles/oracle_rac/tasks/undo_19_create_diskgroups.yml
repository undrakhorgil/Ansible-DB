---
# Undo 19: drop only non-CRS disk groups from asm_diskgroups (never CRS / +GRID used_for_grid_crs: true).

- name: Import ASM SID facts for this host
  ansible.builtin.import_tasks: asm_sid_facts.yml

- name: Undo 19 skip diskgroup drop when no non-CRS diskgroups are configured
  ansible.builtin.debug:
    msg: "Skipping undo 19 — no asm_diskgroups entries with used_for_grid_crs: false."
  when:
    - inventory_hostname == rac_primary_node
    - (asm_diskgroups | default([]) | rejectattr('used_for_grid_crs', 'equalto', true) | list | length) == 0

# Mounted disk groups must be DISMOUNTED on every ASM instance before DROP (RAC). CRS disk groups are skipped by when:.
- name: Undo 19 dismount non-CRS ASM disk groups on all nodes (sqlplus as SYSASM)
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid_for_node }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF ECHO OFF PAGESIZE 0
    WHENEVER SQLERROR CONTINUE
    ALTER DISKGROUP {{ dg.name }} DISMOUNT FORCE;
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  register: asm_dg_dismount
  loop: "{{ asm_diskgroups | default([]) }}"
  loop_control:
    loop_var: dg
    label: "{{ dg.name }}"
  changed_when: asm_dg_dismount.rc == 0
  failed_when: false
  when:
    - not (dg.used_for_grid_crs | default(false) | bool)

- name: Undo 19 drop non-CRS ASM disk groups (sqlplus as SYSASM)
  ansible.builtin.shell: |
    set -euo pipefail
    export ORACLE_HOME="{{ grid_home }}"
    export ORACLE_SID="{{ asm_instance_sid_for_node }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    sqlplus -s "/ as sysasm" <<'EOSQL'
    SET HEADING OFF FEEDBACK OFF VERIFY OFF ECHO OFF PAGESIZE 0
    WHENEVER SQLERROR EXIT SQL.SQLCODE
    DROP DISKGROUP {{ dg.name }} INCLUDING CONTENTS;
    EXIT;
    EOSQL
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  register: asm_dg_drop
  loop: "{{ asm_diskgroups | default([]) }}"
  loop_control:
    loop_var: dg
    label: "{{ dg.name }}"
  changed_when: asm_dg_drop.rc == 0
  failed_when: >-
    asm_dg_drop.rc | int != 0
    and ('ORA-15001' not in (asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')))
    and ('ORA-15039' not in (asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')))
    and ('ORA-15032' not in (asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')))
    and ('ORA-15007' not in (asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')))
    and ('ORA-15104' not in (asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')))
    and ('not mounted' not in ((asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')) | lower))
    and ('does not exist' not in ((asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')) | lower))
    and ('already' not in ((asm_dg_drop.stdout | default('') + asm_dg_drop.stderr | default('')) | lower))
  when:
    - inventory_hostname == rac_primary_node
    - not (dg.used_for_grid_crs | default(false) | bool)

# DROP DISKGROUP clears ASM metadata; Clusterware may still show ora.<dg>.dg (OFFLINE). Remove OCR registration.
- name: Undo 19 remove clusterware ASM disk group resource (srvctl)
  ansible.builtin.shell: |
    export ORACLE_HOME="{{ grid_home }}"
    export PATH="$ORACLE_HOME/bin:$PATH"
    srvctl remove diskgroup -diskgroup "{{ dg.name }}" -force
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ grid_user }}"
  register: asm_dg_srvctl_remove
  changed_when: asm_dg_srvctl_remove.rc == 0
  failed_when: false
  loop: "{{ asm_diskgroups | default([]) }}"
  loop_control:
    loop_var: dg
    label: "{{ dg.name }}"
  when:
    - inventory_hostname == rac_primary_node
    - not (dg.used_for_grid_crs | default(false) | bool)
