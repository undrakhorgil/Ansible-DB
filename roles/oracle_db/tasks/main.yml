---
- name: Copy Oracle Database software to target
  copy:
    src: "{{ oracle_db_software_zip }}"
    dest: "/tmp/db_software.zip"
    mode: "0644"
  delegate_to: localhost
  run_once: true

- name: Unpack Oracle Database software
  unarchive:
    src: "/tmp/db_software.zip"
    dest: "{{ oracle_home }}"
    remote_src: yes

- name: Create database install response file
  template:
    src: db_install.rsp.j2
    dest: "/tmp/db_install.rsp"
    owner: "{{ oracle_user }}"
    group: "{{ oinstall_group }}"
    mode: "0600"

- name: Install Oracle RDBMS software (silent)
  become_user: "{{ oracle_user }}"
  command: >
    {{ oracle_home }}/runInstaller
    -silent
    -responseFile /tmp/db_install.rsp
    -ignorePrereqFailure
  args:
    chdir: "{{ oracle_home }}"

- name: Create listener and database using DBCA
  become_user: "{{ oracle_user }}"
  command: >
    {{ oracle_home }}/bin/dbca
    -silent
    -createDatabase
    -templateName General_Purpose.dbc
    -gdbName {{ db_name }}
    -sid {{ db_sid }}
    -sysPassword {{ oracle_sys_password }}
    -systemPassword {{ oracle_system_password }}
    -characterSet {{ db_character_set }}
    -createAsContainerDatabase false
    -databaseType MULTIPURPOSE
    -automaticMemoryManagement true
    -storageType ASM
    -diskGroupName DATA
    -emConfiguration NONE

